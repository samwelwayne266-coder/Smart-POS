<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wayne Core | Smart POS</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --accent: #6366f1; 
            --bg-deep: #020617; 
            --glass: rgba(15, 23, 42, 0.98); 
        }

        body { 
            background-color: var(--bg-deep); 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .glass-panel { background: var(--glass); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.08); }

        /* SCANNER UI */
        #pos-reader { border: none !important; width: 100% !important; border-radius: 1.5rem; overflow: hidden; background: #000; }
        .scanner-container { position: relative; border-radius: 2rem; border: 1px solid rgba(99, 102, 241, 0.3); overflow: hidden; }
        
        .brackets { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); width: 70%; height: 40%; 
            z-index: 50; pointer-events: none; 
        }
        .brk { position: absolute; width: 30px; height: 30px; border: 3px solid #fff; filter: drop-shadow(0 0 10px var(--accent)); }
        .tl { top: 0; left: 0; border-right: 0; border-bottom: 0; border-radius: 12px 0 0 0; }
        .tr { top: 0; right: 0; border-left: 0; border-bottom: 0; border-radius: 0 12px 0 0; }
        .bl { bottom: 0; left: 0; border-right: 0; border-top: 0; border-radius: 0 0 0 12px; }
        .br { bottom: 0; right: 0; border-left: 0; border-top: 0; border-radius: 0 0 12px 0; }
        
        .laser { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: #ef4444; animation: sweep 2.5s infinite linear; z-index: 51; }
        @keyframes sweep { 0%, 100% { top: 10% } 50% { top: 90% } }

        .compact-btn {
            padding: 0.6rem 1.2rem; border-radius: 0.75rem; font-size: 0.7rem; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 0.15em; transition: 0.2s; cursor: pointer;
        }
        .compact-btn:active { transform: scale(0.95); }

        .stock-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s ease;
        }

        .scroll-area { max-height: 450px; overflow-y: auto; padding-right: 8px; }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        #scan-indicator {
            position: absolute; top: 10px; right: 10px; padding: 4px 8px; 
            background: #10b981; color: white; border-radius: 6px; font-size: 8px; 
            font-weight: 900; opacity: 0; transition: opacity 0.3s; z-index: 60;
        }
    </style>
</head>

<body class="flex flex-col md:flex-row">
    <nav class="hidden md:flex flex-col w-64 glass-panel border-r border-white/5 p-6 gap-3 z-[100] fixed h-full">
        <div class="mb-10">
            <h2 class="text-xl font-black italic uppercase text-white">Wayne <span class="text-indigo-500">Core</span></h2>
            <p id="user-uid-display" class="text-[10px] font-mono text-slate-500 uppercase tracking-tight">UID: LOADING...</p>
        </div>
        <div class="space-y-2">
            <button class="w-full text-left flex items-center gap-3 p-3 rounded-xl text-[14px] font-black text-slate-400 hover:bg-white/5 uppercase">📊 Inventory</button>
            <button class="w-full text-left bg-indigo-600 flex items-center gap-3 p-3 rounded-xl text-[14px] font-black text-white uppercase shadow-lg">💳 Terminal</button>
        </div>
    </nav>

    <main class="flex-1 md:ml-64 p-5 lg:p-12 mb-24">
        <header class="mb-10">
            <p class="text-indigo-400 font-mono text-[9px] tracking-[0.5em] mb-1 uppercase">WayneOS v13.5</p>
            <h1 class="text-5xl md:text-7xl font-black uppercase italic tracking-tighter">SMART <span class="text-indigo-500 text-6xl">POS</span></h1>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="glass-panel p-4 scanner-container shadow-2xl border border-indigo-500/20">
                    <div id="scan-indicator">SCAN SUCCESS</div>
                    <p class="text-[8px] font-black uppercase text-indigo-400 mb-3 px-2 tracking-widest">Quantum Reader</p>
                    <div class="relative">
                        <div id="pos-reader"></div>
                        <div class="brackets">
                            <div class="brk tl"></div><div class="brk tr"></div>
                            <div class="brk bl"></div><div class="brk br"></div>
                            <div class="laser"></div>
                        </div>
                    </div>
                </div>

                <div class="glass-panel p-6 rounded-[2rem] border border-white/5">
                    <div class="flex justify-between items-center mb-4">
                        <h4 class="text-[10px] font-black uppercase text-slate-500 tracking-widest">Manual Catalog</h4>
                        <input type="text" id="catalogSearch" oninput="filterCatalog()" placeholder="SEARCH..." class="bg-slate-900 border border-white/10 rounded-lg p-2 text-[9px] font-mono text-indigo-400 outline-none w-28">
                    </div>
                    <div id="catalog-list" class="scroll-area space-y-2">
                        </div>
                </div>
            </div>

            <div class="lg:col-span-4 space-y-6">
                <div class="glass-panel p-6 rounded-[2rem] min-h-[500px] flex flex-col border border-white/5">
                    <div class="flex justify-between items-center mb-6">
                        <h4 class="text-[10px] font-black uppercase text-indigo-400 tracking-widest">Active Basket</h4>
                        <button onclick="clearBasket()" class="text-[8px] font-black text-red-500 uppercase">Clear</button>
                    </div>
                    
                    <div id="cart" class="scroll-area flex-1 space-y-3">
                        </div>

                    <div class="mt-4 pt-4 border-t border-white/5">
                        <div class="flex justify-between items-end p-2">
                            <p class="text-[9px] font-black text-slate-500 uppercase">Total Due</p>
                            <h2 id="total" class="text-4xl font-black text-white font-mono">KSH 0.00</h2>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4">
                <div class="glass-panel p-8 rounded-[2.5rem] text-center space-y-8 shadow-2xl">
                    <div class="space-y-4">
                        <p class="text-[8px] font-black text-slate-500 uppercase tracking-widest">Payment Method</p>
                        <div class="grid grid-cols-1 gap-2">
                            <button onclick="setMethod('CASH')" id="btn-CASH" class="payment-btn compact-btn bg-indigo-600 text-white">Cash</button>
                            <button onclick="setMethod('MPESA')" id="btn-MPESA" class="payment-btn compact-btn bg-white/5 text-slate-400">M-Pesa</button>
                            <button onclick="setMethod('CARD')" id="btn-CARD" class="payment-btn compact-btn bg-white/5 text-slate-400">Card</button>
                        </div>
                    </div>

                    <button onclick="finalizeSale()" class="compact-btn w-full bg-indigo-600 py-6 text-[12px] shadow-lg text-white">Finalize Transaction</button>
                    
                    <div class="pt-4 opacity-20 text-[7px] font-mono uppercase">
                        Terminal ID: WC-001<br>Encrypted via WayneCore
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="md:hidden fixed bottom-0 w-full glass-panel border-t border-white/10 p-5 flex justify-around items-center z-[1000] rounded-t-[2.5rem]">
        <button class="p-3 bg-slate-800 rounded-2xl">📊</button>
        <button class="p-3 bg-indigo-600 rounded-2xl shadow-lg">💳</button>
    </div>

    <script type="module">
        // --- CONFIGURATION ---
        const firebaseConfig = { 
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let stock = {}, basket = [], currentMethod = 'CASH';
        let isScanLocked = false;

        // --- AUTH ---
        auth.signInAnonymously();
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('user-uid-display').innerText = `UID: ${user.uid.substring(0,12)}...`;
                // Listen to Realtime Database
                db.ref('inventory').on('value', snap => {
                    stock = snap.val() || {};
                    renderCatalog();
                });
            }
        });

        // --- SCANNER ---
        const scanner = new Html5Qrcode("pos-reader");
        scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (text) => {
            if (isScanLocked) return;
            
            // Search stock for matching barcode
            let foundKey = Object.keys(stock).find(key => stock[key].code === text);
            if(foundKey) {
                flashIndicator();
                addToBasket(foundKey);
                lockScanner();
            }
        }).catch(err => console.error(err));

        function lockScanner() {
            isScanLocked = true;
            setTimeout(() => isScanLocked = false, 1500);
        }

        function flashIndicator() {
            const ind = document.getElementById('scan-indicator');
            ind.style.opacity = '1';
            setTimeout(() => ind.style.opacity = '0', 800);
        }

        // --- CATALOG & BASKET ---
        window.renderCatalog = (filter = "") => {
            const list = document.getElementById('catalog-list');
            list.innerHTML = '';
            Object.keys(stock).forEach(key => {
                const item = stock[key];
                if(item.name.toLowerCase().includes(filter.toLowerCase())) {
                    const div = document.createElement('div');
                    div.className = "stock-card p-3 rounded-xl flex justify-between items-center cursor-pointer mb-2";
                    div.onclick = () => addToBasket(key);
                    div.innerHTML = `
                        <div class="flex flex-col">
                            <span class="text-[10px] font-black text-white uppercase">${item.name}</span>
                            <span class="text-[7px] font-mono text-slate-500">${item.code}</span>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black text-indigo-400">KSH ${item.price}</p>
                            <p class="text-[8px] font-bold text-slate-700">${item.qty} IN STOCK</p>
                        </div>`;
                    list.appendChild(div);
                }
            });
        };

        window.addToBasket = (key) => {
            const item = stock[key];
            const existing = basket.find(b => b.key === key);
            if(existing) {
                existing.qty++;
            } else {
                basket.push({ ...item, key: key, qty: 1 });
            }
            renderCart();
        };

        window.renderCart = () => {
            let total = 0;
            const cartDiv = document.getElementById('cart');
            cartDiv.innerHTML = basket.map((i, index) => {
                total += (i.qty * i.price);
                return `
                    <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5">
                        <div class="flex-1">
                            <p class="text-[10px] font-black text-white uppercase">${i.name}</p>
                            <div class="flex items-center gap-2 mt-1">
                                <button onclick="adjustQty(${index}, -1)" class="w-6 h-6 bg-slate-800 rounded-lg text-xs">-</button>
                                <span class="text-[10px] font-mono text-indigo-400">${i.qty}</span>
                                <button onclick="adjustQty(${index}, 1)" class="w-6 h-6 bg-slate-800 rounded-lg text-xs">+</button>
                            </div>
                        </div>
                        <span class="text-[11px] font-black text-indigo-300">KSH ${i.qty * i.price}</span>
                    </div>`;
            }).join('');
            document.getElementById('total').innerText = `KSH ${total.toFixed(2)}`;
        };

        window.adjustQty = (index, delta) => {
            basket[index].qty += delta;
            if(basket[index].qty <= 0) basket.splice(index, 1);
            renderCart();
        };

        window.setMethod = (m) => {
            currentMethod = m;
            document.querySelectorAll('.payment-btn').forEach(btn => {
                btn.classList.replace('bg-indigo-600', 'bg-white/5');
                btn.classList.replace('text-white', 'text-slate-400');
            });
            document.getElementById('btn-'+m).classList.replace('bg-white/5', 'bg-indigo-600');
            document.getElementById('btn-'+m).classList.replace('text-slate-400', 'text-white');
        };

        window.finalizeSale = () => {
            if(basket.length === 0) return alert("EMPTY BASKET");
            
            const updates = {};
            const saleId = Date.now();
            
            basket.forEach(item => {
                updates[`inventory/${item.key}/qty`] = stock[item.key].qty - item.qty;
            });
            
            updates[`sales/${saleId}`] = {
                items: basket,
                total: basket.reduce((acc, i) => acc + (i.qty * i.price), 0),
                method: currentMethod,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };

            db.ref().update(updates).then(() => {
                alert("SALE SYNCED");
                basket = [];
                renderCart();
            });
        };

        window.clearBasket = () => { basket = []; renderCart(); };
        window.filterCatalog = () => { renderCatalog(document.getElementById('catalogSearch').value); };
    </script>
</body>
</html>

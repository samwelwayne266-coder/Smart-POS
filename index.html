<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud POS System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-container">
        <h2>POS Login</h2>
        <button id="login-btn">Login with Google</button>
    </div>

    <div id="app-container" class="hidden">
        <header>
            <h1>Modern POS</h1>
            <button id="logout-btn">Logout</button>
        </header>

        <main>
            <section id="products">
                <h2>Products</h2>
                <div class="grid" id="product-grid">
                    <div class="card" onclick="addToCart('Coffee', 4.50)">
                        <h3>Coffee</h3>
                        <p>$4.50</p>
                    </div>
                    <div class="card" onclick="addToCart('Muffin', 3.00)">
                        <h3>Muffin</h3>
                        <p>$3.00</p>
                    </div>
                </div>
            </section>

            <section id="cart">
                <h2>Current Order</h2>
                <ul id="cart-items"></ul>
                <div class="total">
                    <strong>Total: $<span id="total-price">0.00</span></strong>
                </div>
                <button id="checkout-btn">Complete Sale</button>
            </section>
        </main>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>

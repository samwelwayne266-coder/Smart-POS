<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud POS - Debug Mode</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="status-bar">System Status: <span id="sys-status">Initializing...</span></div>

    <div id="auth-container">
        <h2>POS Terminal</h2>
        <p>Login required to open register</p>
        <button id="login-btn">Sign in with Google</button>
        <div id="debug-log" style="color: red; margin-top: 20px; font-size: 12px; font-family: monospace;"></div>
    </div>

    <div id="app-container" class="hidden">
        <header>
            <span id="user-display">Welcome</span>
            <button id="logout-btn">Logout</button>
        </header>

        <main>
            <section id="menu">
                <div class="card" onclick="addToCart('Coffee', 4.50)">☕ Coffee $4.50</div>
                <div class="card" onclick="addToCart('Burger', 12.00)">🍔 Burger $12.00</div>
                <div class="card" onclick="addToCart('Soda', 2.50)">🥤 Soda $2.50</div>
            </section>

            <section id="cart-panel">
                <h3>Current Order</h3>
                <div id="cart-items"></div>
                <div id="total-row">Total: $<span id="total-val">0.00</span></div>
                <button id="checkout-btn">Submit Order</button>
            </section>
        </main>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
